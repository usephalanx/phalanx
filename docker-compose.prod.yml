# ─────────────────────────────────────────────────────────────────────────────
# FORGE — Production Docker Compose
# Pre-built images loaded by deploy.sh — no `docker build` on server.
# Usage (server): docker compose up -d --no-build
# ─────────────────────────────────────────────────────────────────────────────

name: phalanx-prod

x-forge-base: &forge-base
  env_file: .env
  restart: always
  logging:
    driver: "json-file"
    options:
      max-size: "50m"
      max-file: "5"
  networks:
    - forge-net

services:

  # ── Postgres + pgvector ──────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    <<: *forge-base
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - forge-postgres-data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-forge} -d ${POSTGRES_DB:-forge}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    <<: *forge-base
    command: >
      redis-server
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD}
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  # ── Alembic Migrations (runs once then exits) ────────────────────────────
  phalanx-migrate:
    image: phalanx-api:latest
    <<: *forge-base
    command: alembic -c alembic/alembic.ini upgrade head
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy

  # ── FastAPI ───────────────────────────────────────────────────────────────
  phalanx-api:
    image: phalanx-api:latest
    <<: *forge-base
    command: uvicorn phalanx.api.main:app --host 0.0.0.0 --port 8000 --workers 2
    ports:
      - "8000:8000"
    volumes:
      - ./configs:/app/configs:ro
      - ./skill-registry:/app/skill-registry:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  # ── Celery Worker (all queues except sre) ────────────────────────────────
  phalanx-worker:
    image: phalanx-worker:latest
    <<: *forge-base
    command: >
      celery -A phalanx.queue.celery_app worker
      --loglevel=warning
      --queues=default,commander,planner,reviewer,qa,release,security,builder,ingestion,skill_drills,ci_fixer
      --concurrency=4
      --max-tasks-per-child=100
    user: root
    environment:
      PHALANX_WORKER: "1"   # forces NullPool — prevents "Future attached to different loop" in forked workers
      OPENAI_MODEL_REASONING: "gpt-4.1"  # reasoning agents: Commander, Planner, QA, Reviewer, Release
    volumes:
      - forge-repos:/tmp/forge-repos
      - ./configs:/app/configs:ro
      - ./skill-registry:/app/skill-registry:ro
      - /var/run/docker.sock:/var/run/docker.sock  # required: CI fixer spawns sandbox containers
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      # Check the celery master process is alive (no broker round-trip needed)
      test: ["CMD-SHELL", "celery -A phalanx.queue.celery_app inspect ping -d celery@$$HOSTNAME --timeout 10 2>&1 | grep -q pong"]
      interval: 60s
      timeout: 15s
      start_period: 60s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  # ── SRE Worker (isolated — Docker socket access for demo deployments) ─────
  # Separate from phalanx-worker so Docker access is scoped only here.
  # Runs as root so it can reach /var/run/docker.sock (gid=999 on this host).
  # Also on demos-net so it can inspect container IPs after starting them.
  phalanx-sre-worker:
    image: phalanx-worker:latest
    <<: *forge-base
    command: >
      celery -A phalanx.queue.celery_app worker
      --loglevel=warning
      --queues=sre
      --concurrency=2
      --max-tasks-per-child=10
    user: root
    environment:
      PHALANX_WORKER: "1"   # forces NullPool — required in all Celery workers
      OPENAI_MODEL_REASONING: "gpt-4.1"
    volumes:
      - forge-repos:/tmp/forge-repos
      - ./configs:/app/configs:ro
      - ./skill-registry:/app/skill-registry:ro
      - /var/run/docker.sock:/var/run/docker.sock  # required: SRE builds + starts demo containers
    networks:
      - forge-net
      - demos-net   # required: SRE inspects container IPs after docker run
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A phalanx.queue.celery_app inspect ping -d celery@$$HOSTNAME --timeout 10 2>&1 | grep -q pong"]
      interval: 60s
      timeout: 15s
      start_period: 60s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G   # image builds need more headroom than regular agents

  # ── Nginx — Landing page + reverse proxy + demo subdomain ────────────────
  nginx:
    image: nginx:alpine
    <<: *forge-base
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/nginx.demos.conf:/etc/nginx/conf.d/demos.conf:ro  # demo.usephalanx.com server block
      - ./site:/usr/share/nginx/html:ro
      - ./ssl:/etc/nginx/ssl:ro
    networks:
      - forge-net
      - demos-net   # must be on demos-net to proxy_pass to demo containers by IP
    depends_on:
      phalanx-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 64M

  # ── Slack Gateway ─────────────────────────────────────────────────────────
  phalanx-gateway:
    image: phalanx-api:latest
    <<: *forge-base
    command: python -m phalanx.gateway.slack_bot
    volumes:
      - ./configs:/app/configs:ro
      - ./skill-registry:/app/skill-registry:ro
    depends_on:
      phalanx-api:
        condition: service_healthy
    healthcheck:
      disable: true
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

volumes:
  forge-postgres-data:
  forge-repos:

networks:
  forge-net:
    driver: bridge
  demos-net:
    driver: bridge
    # Demo containers are started directly by the SRE agent (not via compose),
    # so they are connected to this network at runtime via docker run --network.
    # nginx and phalanx-sre-worker must be on this network to reach them.
