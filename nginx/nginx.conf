upstream forge_api {
    server forge-api:8000;
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;
limit_req_zone $binary_remote_addr zone=slack:10m rate=120r/m;

server {
    listen 80;
    server_name _;

    # Health check — no rate limit, no auth
    location /health {
        proxy_pass http://forge_api/health;
        proxy_set_header Host $host;
        access_log off;
    }

    # Slack events endpoint — higher rate limit (Slack retries)
    location /slack/ {
        limit_req zone=slack burst=30 nodelay;
        proxy_pass http://forge_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }

    # GitHub webhooks
    location /webhooks/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://forge_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }

    # API — general
    location / {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://forge_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;

        # Security headers
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
    }

    # Block docs in production
    location ~ ^/(docs|redoc|openapi.json) {
        return 403;
    }
}
