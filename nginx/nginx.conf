upstream phalanx_api {
    server phalanx-api:8000;
}

limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;
limit_req_zone $binary_remote_addr zone=slack:10m rate=120r/m;

# HTTP — redirect to HTTPS
server {
    listen 80;
    server_name usephalanx.com www.usephalanx.com;
    return 301 https://$host$request_uri;
}

# HTTPS
server {
    listen 443 ssl;
    http2 on;
    server_name usephalanx.com www.usephalanx.com _;

    ssl_certificate     /etc/nginx/ssl/usephalanx.crt;
    ssl_certificate_key /etc/nginx/ssl/usephalanx.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root /usr/share/nginx/html;
    index index.html;

    # Landing page static files
    location / {
        try_files $uri $uri/ @spa;
        add_header Cache-Control "public, max-age=3600";
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
    }

    # Demo video — long cache, range support
    location ~* \.mp4$ {
        add_header Cache-Control "public, max-age=86400";
        add_header Accept-Ranges bytes;
    }

    # Health check — proxy to API
    location /health {
        proxy_pass http://phalanx_api/health;
        proxy_set_header Host $host;
        access_log off;
    }

    # Slack events
    location /slack/ {
        limit_req zone=slack burst=30 nodelay;
        proxy_pass http://phalanx_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }

    # CI webhooks (singular — matches /webhook/github, /webhook/buildkite)
    location /webhook/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://phalanx_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }

    # GitHub webhooks (legacy plural path)
    location /webhooks/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://phalanx_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }

    # API calls
    # v1 API routes (work-orders, runs, ci-integrations, etc.)
    location /v1/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://phalanx_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    location /api/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://phalanx_api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }


    # SPA fallback — only for non-API paths
    location @spa {
        add_header Cache-Control "public, max-age=3600";
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
        try_files /index.html =404;
    }
    location ~ ^/(docs|redoc|openapi.json) {
        return 403;
    }
}
