# nginx config for demo.usephalanx.com
#
# This file must be included in the main nginx.conf http block:
#   include /etc/nginx/nginx.demos.conf;
#
# Per-demo location blocks are dynamically injected by the SRE agent into
# /etc/nginx/conf.d/demos/<slug>.conf — nginx reloads after each deploy.
# The upstream phalanx_api block below handles the demo portal API.

upstream phalanx_api_demo {
    server phalanx-api:8000;
    keepalive 16;
}

# HTTP → HTTPS redirect for demo subdomain
server {
    listen 80;
    server_name demo.usephalanx.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name demo.usephalanx.com;

    ssl_certificate     /etc/nginx/ssl/usephalanx.crt;
    ssl_certificate_key /etc/nginx/ssl/usephalanx.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL_DEMO:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header Strict-Transport-Security "max-age=31536000" always;

    # ── Demo portal UI (/demos → phalanx API HTML page) ──────────────────
    location = /demos {
        proxy_pass         http://phalanx_api_demo/demos;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Demo portal API (/v1/demos/*) ─────────────────────────────────────
    location /v1/demos {
        proxy_pass         http://phalanx_api_demo;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── Per-demo app routes — dynamically included by SRE agent ──────────
    # Each file contains a `location /<slug>/ { ... }` block that proxies to
    # the demo container by name on the demos-net Docker network.
    # SRE agent writes: /etc/nginx/conf.d/demos/<slug>.conf
    # then runs: docker exec phalanx-prod-nginx-1 nginx -s reload
    include /etc/nginx/conf.d/demos/*.conf;

    # Catch-all: redirect bare domain to demo portal
    location / {
        return 302 /demos;
    }
}
