name: CI — Quality Gates

# ─────────────────────────────────────────────────────────────────────────────
# Every gate must PASS before merge is allowed.
# Evidence artifacts are uploaded so every failure is debuggable.
# Gates are independent jobs — fail fast, run in parallel where possible.
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main, develop, "phalanx/ci-fix/**"]
  pull_request:
    branches: [main, develop, ci-fixer-e2e-test]
  workflow_dispatch:

# Cancel in-progress runs on new push to same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  POSTGRES_USER: forge
  POSTGRES_PASSWORD: forge_test
  POSTGRES_DB: forge_test
  DATABASE_URL: postgresql+asyncpg://forge:forge_test@localhost:5432/forge_test
  REDIS_URL: redis://localhost:6379/0
  CELERY_BROKER_URL: redis://localhost:6379/0
  CELERY_RESULT_BACKEND: redis://localhost:6379/1
  FORGE_ENV: test
  FORGE_ENABLE_PGVECTOR: "true"
  # Anthropic key from secrets — skip LLM calls in unit tests
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY || 'sk-test-placeholder' }}

# ─────────────────────────────────────────────────────────────────────────────
# GATE 1: Code Quality (lint, format, types)
# Fails immediately — no point running tests on broken code
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  quality:
    name: "Gate 1 — Code Quality"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: |
          ruff check phalanx/ tests/ --output-format=github
          echo "✅ Lint passed"

      - name: Format check (ruff format)
        run: |
          ruff format --check phalanx/ tests/
          echo "✅ Format check passed"

      - name: Type check (mypy)
        run: |
          mypy phalanx/ \
            --ignore-missing-imports \
            --no-error-summary \
            --show-error-codes
          echo "✅ Type check passed"

      - name: Check for debug artifacts
        run: |
          # Fail if any breakpoint(), pdb, or print() in production code
          if grep -rn "breakpoint()\|import pdb\|pdb.set_trace()" phalanx/; then
            echo "❌ Debug artifacts found in production code"
            exit 1
          fi
          echo "✅ No debug artifacts"

      - name: Check for hardcoded secrets patterns
        run: |
          pip install detect-secrets
          detect-secrets scan phalanx/ \
            --exclude-files "\.pyc$" \
            2>/dev/null > secrets-scan.json || true
          python -c "
          import json, sys
          try:
              with open('secrets-scan.json') as f:
                  data = json.load(f)
          except (json.JSONDecodeError, FileNotFoundError):
              print('✅ No secrets detected (empty scan output)')
              sys.exit(0)
          results = data.get('results', {})
          if results:
              print('❌ Potential secrets detected:')
              for f, findings in results.items():
                  for finding in findings:
                      print(f'  {f}:{finding[\"line_number\"]}')
              sys.exit(1)
          print('✅ No secrets detected')
          "

# ─────────────────────────────────────────────────────────────────────────────
# GATE 2: Config & Skill Validation
# YAML configs and skill files must be schema-valid
# ─────────────────────────────────────────────────────────────────────────────
  validate:
    name: "Gate 2 — Config & Skill Validation"
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Validate team/project/workflow configs
        run: |
          python scripts/validate_config.py --strict
          echo "✅ All config files valid"

      - name: Validate skill YAML files
        run: |
          python scripts/validate_skills.py --strict
          echo "✅ All skill files valid"

      - name: Validate skill completeness
        run: |
          # Every skill must have: procedure, quality_criteria, rollback, output_template
          python -c "
          import yaml, os, sys
          skill_dir = 'skill-registry'
          errors = []
          required_sections = ['procedure', 'quality_criteria', 'output_template']

          for root, _, files in os.walk(skill_dir):
              for f in files:
                  if not f.endswith('.yaml') or f == 'registry.yaml':
                      continue
                  path = os.path.join(root, f)
                  with open(path) as fh:
                      data = yaml.safe_load(fh)
                  if data.get('kind') != 'Skill':
                      continue
                  spec = data.get('spec', {})
                  for section in required_sections:
                      if section not in spec:
                          errors.append(f'{path}: missing spec.{section}')

          if errors:
              print('❌ Skill files incomplete:')
              for e in errors: print(f'  {e}')
              sys.exit(1)
          print(f'✅ All skill files complete')
          "

      - name: Check skill registry index is up to date
        run: |
          python -c "
          import yaml, os, sys
          with open('skill-registry/registry.yaml') as f:
              registry = yaml.safe_load(f)
          indexed = {s['id'] for s in registry.get('skills', [])}

          found = set()
          for root, _, files in os.walk('skill-registry/domains'):
              for fname in files:
                  if fname.endswith('.yaml'):
                      path = os.path.join(root, fname)
                      with open(path) as f:
                          data = yaml.safe_load(f)
                      if data and data.get('kind') == 'Skill':
                          found.add(data['metadata']['id'])

          missing = found - indexed
          if missing:
              print('❌ Skills not in registry.yaml:', missing)
              sys.exit(1)
          print(f'✅ Registry index complete ({len(indexed)} skills)')
          "

# ─────────────────────────────────────────────────────────────────────────────
# GATE 3: Security Scan
# Python SAST, dependency vulnerabilities — runs in parallel with unit tests
# ─────────────────────────────────────────────────────────────────────────────
  security:
    name: "Gate 3 — Security Scan"
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install security tools
        run: pip install bandit[toml] safety pip-audit -e ".[dev]"

      - name: SAST — Bandit
        run: |
          bandit -r phalanx/ \
            -f json \
            -o bandit-report.json \
            -ll \
            --exclude phalanx/tests \
            || true  # capture output even on findings

          python -c "
          import json, sys
          with open('bandit-report.json') as f:
              report = json.load(f)
          high = [r for r in report['results'] if r['issue_severity'] == 'HIGH']
          medium = [r for r in report['results'] if r['issue_severity'] == 'MEDIUM']
          if high:
              print(f'❌ Bandit: {len(high)} HIGH severity findings:')
              for r in high:
                  print(f'  {r[\"filename\"]}:{r[\"line_number\"]} — {r[\"issue_text\"]}')
              sys.exit(1)
          if medium:
              print(f'⚠️  Bandit: {len(medium)} MEDIUM findings (warnings only)')
              for r in medium:
                  print(f'  {r[\"filename\"]}:{r[\"line_number\"]} — {r[\"issue_text\"]}')
          print('✅ Bandit: no HIGH severity findings')
          "

      - name: Dependency audit — pip-audit
        run: |
          pip-audit \
            --format=json \
            --output=pip-audit-report.json \
            --ignore-vuln PYSEC-2022-42969 \
            || true

          python -c "
          import json, sys
          with open('pip-audit-report.json') as f:
              report = json.load(f)
          vulns = report.get('dependencies', [])
          critical = [
              v for dep in vulns
              for v in dep.get('vulns', [])
              if any(alias.startswith('CVE') for alias in v.get('aliases', []))
          ]
          if critical:
              print(f'❌ pip-audit: {len(critical)} CVE vulnerabilities:')
              for v in critical[:5]:
                  print(f'  {v.get(\"id\")}: {v.get(\"description\", \"\")[:100]}')
              sys.exit(1)
          print('✅ pip-audit: no CVE vulnerabilities')
          "

      - name: Upload security reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-reports-${{ github.sha }}
          path: |
            bandit-report.json
            pip-audit-report.json
          retention-days: 30

# ─────────────────────────────────────────────────────────────────────────────
# GATE 4: Unit Tests + Coverage
# Fails if coverage < 70% or any test fails
# ─────────────────────────────────────────────────────────────────────────────
  unit-tests:
    name: "Gate 4 — Unit Tests & Coverage"
    runs-on: ubuntu-latest
    needs: quality

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: forge
          POSTGRES_PASSWORD: forge_test
          POSTGRES_DB: forge_test
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run migrations
        run: alembic upgrade head

      - name: Run unit tests
        run: |
          pytest tests/unit/ \
            -v \
            --tb=short \
            --cov=phalanx \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-report=html:htmlcov \
            --cov-fail-under=70 \
            --junitxml=test-results-unit.xml \
            -n auto  # parallel with pytest-xdist

      - name: Check coverage per module
        run: |
          python -c "
          import xml.etree.ElementTree as ET, sys
          tree = ET.parse('coverage.xml')
          root = tree.getroot()
          low_coverage = []
          critical_modules = [
              'phalanx/workflow/state_machine',
              'phalanx/db/models',
              'phalanx/guardrails',
          ]
          for pkg in root.findall('.//class'):
              name = pkg.get('filename', '')
              line_rate = float(pkg.get('line-rate', 0))
              pct = line_rate * 100
              if any(m in name for m in critical_modules) and pct < 80:
                  low_coverage.append((name, pct))
          if low_coverage:
              print('❌ Critical modules below 80% coverage:')
              for name, pct in low_coverage:
                  print(f'  {name}: {pct:.1f}%')
              sys.exit(1)
          print('✅ Critical module coverage OK')
          "

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results-${{ github.sha }}
          path: |
            test-results-unit.xml
            coverage.xml
            htmlcov/
          retention-days: 30

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          fail_ci_if_error: false

# ─────────────────────────────────────────────────────────────────────────────
# GATE 5: Integration Tests
# Tests that hit real Postgres + Redis
# ─────────────────────────────────────────────────────────────────────────────
  integration-tests:
    name: "Gate 5 — Integration Tests"
    runs-on: ubuntu-latest
    needs: [unit-tests, validate]

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: forge
          POSTGRES_PASSWORD: forge_test
          POSTGRES_DB: forge_test
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run migrations
        run: alembic upgrade head

      - name: Run integration tests
        env:
          FORGE_RUN_INTEGRATION: "1"
        run: |
          pytest tests/integration/ \
            -v \
            --tb=long \
            --junitxml=test-results-integration.xml \
            -m "not slow"  # skip long-running tests in CI

      - name: Verify state machine transitions
        run: |
          # Critical: every valid transition must work, every invalid must be rejected
          pytest tests/unit/test_state_machine.py \
            -v \
            --tb=short \
            -k "valid or invalid" \
            --junitxml=test-results-state-machine.xml

      - name: Verify DB constraints enforced
        env:
          FORGE_RUN_INTEGRATION: "1"
        run: |
          # Critical: DB-level constraints (CheckConstraint) must reject bad data
          pytest tests/integration/ \
            -v \
            -k "constraint" \
            --tb=short

      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results-${{ github.sha }}
          path: |
            test-results-integration.xml
            test-results-state-machine.xml
          retention-days: 30

# ─────────────────────────────────────────────────────────────────────────────
# GATE 6: Docker Build
# Production image must build cleanly
# ─────────────────────────────────────────────────────────────────────────────
  docker-build:
    name: "Gate 6 — Docker Build"
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build development image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: development
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: forge:dev-${{ github.sha }}

      - name: Build production image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: production
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: forge:prod-${{ github.sha }}

      - name: Scan production image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: forge:prod-${{ github.sha }}
          format: json
          output: trivy-report.json
          severity: CRITICAL,HIGH
          exit-code: 1
          ignore-unfixed: true

      - name: Upload trivy report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report-${{ github.sha }}
          path: trivy-report.json
          retention-days: 30

# ─────────────────────────────────────────────────────────────────────────────
# GATE 7: Evidence Summary
# All gates must pass. Summarizes evidence artifacts for review.
# ─────────────────────────────────────────────────────────────────────────────
  evidence-summary:
    name: "Gate 7 — Evidence Summary"
    runs-on: ubuntu-latest
    needs: [quality, validate, security, unit-tests, integration-tests, docker-build]
    if: always()

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: evidence/

      - name: Generate evidence report
        run: |
          echo "# FORGE CI Evidence Report" > evidence-summary.md
          echo "Commit: ${{ github.sha }}" >> evidence-summary.md
          echo "Run: ${{ github.run_id }}" >> evidence-summary.md
          echo "Date: $(date -u)" >> evidence-summary.md
          echo "" >> evidence-summary.md

          echo "## Gate Results" >> evidence-summary.md
          echo "| Gate | Status |" >> evidence-summary.md
          echo "|------|--------|" >> evidence-summary.md
          echo "| Code Quality (lint, format, types) | ${{ needs.quality.result }} |" >> evidence-summary.md
          echo "| Config & Skill Validation | ${{ needs.validate.result }} |" >> evidence-summary.md
          echo "| Security Scan (SAST + CVE) | ${{ needs.security.result }} |" >> evidence-summary.md
          echo "| Unit Tests + Coverage ≥70% | ${{ needs.unit-tests.result }} |" >> evidence-summary.md
          echo "| Integration Tests | ${{ needs.integration-tests.result }} |" >> evidence-summary.md
          echo "| Docker Build (dev + prod) | ${{ needs.docker-build.result }} |" >> evidence-summary.md
          echo "" >> evidence-summary.md

          echo "## Artifacts" >> evidence-summary.md
          echo "- Security: bandit-report.json, pip-audit-report.json, trivy-report.json" >> evidence-summary.md
          echo "- Tests: test-results-unit.xml, test-results-integration.xml" >> evidence-summary.md
          echo "- Coverage: coverage.xml, htmlcov/" >> evidence-summary.md
          echo "" >> evidence-summary.md

          # Overall verdict
          if [[ "${{ needs.quality.result }}" == "success" ]] && \
             [[ "${{ needs.validate.result }}" == "success" ]] && \
             [[ "${{ needs.security.result }}" == "success" ]] && \
             [[ "${{ needs.unit-tests.result }}" == "success" ]] && \
             [[ "${{ needs.integration-tests.result }}" == "success" ]] && \
             [[ "${{ needs.docker-build.result }}" == "success" ]]; then
            echo "## ✅ ALL GATES PASSED — Ready for review" >> evidence-summary.md
          else
            echo "## ❌ GATES FAILED — Not ready for merge" >> evidence-summary.md
          fi

          cat evidence-summary.md

      - name: Upload evidence summary
        uses: actions/upload-artifact@v4
        with:
          name: evidence-summary-${{ github.sha }}
          path: evidence-summary.md
          retention-days: 90

      - name: Fail if any gate failed
        if: |
          needs.quality.result != 'success' ||
          needs.validate.result != 'success' ||
          needs.security.result != 'success' ||
          needs.unit-tests.result != 'success' ||
          needs.integration-tests.result != 'success' ||
          needs.docker-build.result != 'success'
        run: |
          echo "❌ One or more quality gates failed. See evidence artifacts."
          exit 1

# ─────────────────────────────────────────────────────────────────────────────
# DEPLOY (main branch only, all gates must pass)
# ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: "Deploy to Production"
    runs-on: ubuntu-latest
    needs: evidence-summary
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production  # requires manual approval in GitHub Environments

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push production image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: production
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy (customize for your platform)
        run: |
          # Example: SSH deploy, Fly.io, Railway, etc.
          # Replace with your actual deploy command
          echo "Deploying ghcr.io/${{ github.repository }}:${{ github.sha }}"
          # fly deploy --image ghcr.io/${{ github.repository }}:${{ github.sha }}

      - name: Verify production health
        run: |
          sleep 15  # wait for deploy to complete
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            ${{ vars.PRODUCTION_URL }}/health)
          if [ "$response" != "200" ]; then
            echo "❌ Production health check failed: HTTP $response"
            exit 1
          fi
          echo "✅ Production health check passed"

      - name: Tag release
        run: |
          git tag "release-$(date +%Y%m%d-%H%M%S)-${{ github.sha }}"
          git push origin --tags
